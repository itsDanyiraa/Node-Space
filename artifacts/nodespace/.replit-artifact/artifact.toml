kind = "web"
previewPath = "/"
title = "NodeSpace"
version = "1.0.0"
id = "artifacts/nodespace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18515

[services.development]
run = "pnpm --filter @workspace/nodespace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nodespace", "run", "build" ]
publicDir = "artifacts/nodespace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18515"
BASE_PATH = "/"
