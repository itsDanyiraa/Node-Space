<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>NodeSpace</title>
    <meta name="description" content="NodeSpace — a visual infinite canvas for thinking. Create nodes, connect ideas, build systems." />
    <meta name="robots" content="index, follow" />

    <!-- PWA / iOS install support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NodeSpace" />
    <meta name="theme-color" content="#0f1117" />

    <!-- Web App Manifest (also injected by VitePWA at build) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- OG / Social -->
    <meta property="og:title" content="NodeSpace" />
    <meta property="og:description" content="A visual infinite canvas for thinking." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NodeSpace" />
    <meta name="twitter:description" content="A visual infinite canvas for thinking." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
